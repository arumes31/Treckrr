{{define "content"}}
<section class="stack">
	{{if .Forced}}
	<div class="flash flash--info">Bitte lege ein neues, persönliches Passwort fest, bevor du fortfährst.</div>
	{{end}}
	<div class="card">
		<h2 class="section-title">Passwort ändern</h2>
		<form method="post" action="/account/password" class="form">
			<label class="field"><span>Aktuelles Passwort</span>
				<input class="input" type="password" name="current_password" autocomplete="current-password" required></label>
			<label class="field"><span>Neues Passwort</span>
				<input class="input" type="password" name="new_password" minlength="8" autocomplete="new-password" required>
				<small class="muted">Mind. 8 Zeichen, Buchstaben und Ziffern.</small></label>
			<button class="btn btn--primary btn--block" type="submit">Passwort speichern</button>
		</form>
	</div>
	{{if not .Forced}}
	<p class="muted center"><a class="link" href="/profile">Zurück zum Profil</a></p>
	{{end}}
</section>
{{end}}
